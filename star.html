<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生日快乐🎂 </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* 星光背景 */
    #starCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #1a0b2e; /* 生日氛围感背景（深紫），可改 */
    }
    /* 生日内容样式（居中、好看） */
    .birthday-box {
      position: relative;
      z-index: 1; /* 内容在星光上面 */
      text-align: center;
      padding: 50px 20px;
      color: #fff; /* 文字白色 */
      font-family: "微软雅黑", sans-serif;
    }
    /* 标题样式 */
    .birthday-title {
      font-size: 48px;
      margin-bottom: 20px;
      color: #ffd700; /* 金色标题 */
      text-shadow: 0 0 10px #ffd700; /* 发光效果 */
    }
    /* 祝福语样式 */
    .birthday-wish {
      font-size: 24px;
      margin-bottom: 30px;
      line-height: 1.8;
    }
    /* 图片样式（适配你的项目图片） */
    .birthday-img {
      width: 80%;
      max-width: 600px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); /* 图片发光边框 */
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- 星光画布（必须保留） -->
  <canvas id="starCanvas"></canvas>

  <!-- 生日内容（可自定义文案/图片） -->
  <div class="birthday-box">
    <h1 class="birthday-title">生日快乐！🎂</h1>
    <p class="birthday-wish">
      愿你岁岁年年，平安喜乐<br>
      所有美好和温柔都如约而至～
    </p>
    <!-- 显示你的项目里的图片（二选一/都加） -->
    <img src="public/images/ZongLi_LiHui.png" class="birthday-img" alt="生日图片">
    <p class="birthday-wish">—— 专属的生日祝福 ✨</p>
  </div>

  <!-- 星光效果JS（不用改） -->
  <script>
    const CONFIG = {
      particleCount: 200, // 星星数量（生日氛围可以多一点）
      minSize: 1,
      maxSize: 4,
      minSpeed: 0.03,
      maxSpeed: 0.15,
      color: 'rgba(255, 215, 0, {opacity})' // 金色星星（贴合生日）
    };

    class StarParticle {
      constructor(canvasWidth, canvasHeight) {
        this.x = Math.random() * canvasWidth;
        this.y = Math.random() * canvasHeight;
        this.size = Math.random() * (CONFIG.maxSize - CONFIG.minSize) + CONFIG.minSize;
        this.speedX = (Math.random() - 0.5) * (CONFIG.maxSpeed - CONFIG.minSpeed) + CONFIG.minSpeed;
        this.speedY = (Math.random() - 0.5) * (CONFIG.maxSpeed - CONFIG.minSpeed) + CONFIG.minSpeed;
        this.opacity = Math.random();
        this.opacitySpeed = Math.random() * 0.005 + 0.001;
      }
      update(canvasWidth, canvasHeight) {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0) this.x = canvasWidth;
        if (this.x > canvasWidth) this.x = 0;
        if (this.y < 0) this.y = canvasHeight;
        if (this.y > canvasHeight) this.y = 0;
        this.opacity += this.opacitySpeed;
        if (this.opacity > 1 || this.opacity < 0) {
          this.opacitySpeed *= -1;
        }
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = CONFIG.color.replace('{opacity}', this.opacity);
        ctx.fill();
      }
    }

    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let particles = [];
    function initParticles() {
      particles = [];
      for (let i = 0; i < CONFIG.particleCount; i++) {
        particles.push(new StarParticle(canvas.width, canvas.height));
      }
    }
    initParticles();

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update(canvas.width, canvas.height);
        particle.draw(ctx);
      });
      requestAnimationFrame(animate);
    }
    animate();
    window.addEventListener('resize', initParticles);
  </script>
</body>
</html>
